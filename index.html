<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口碑预警助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="header-title">
          <h1>口碑预警助手</h1>
          <span class="subtitle">守护门店声誉，及时响应风险</span>
        </div>
      </div>
      <div class="header-right">
        <div class="store-selector">
          <select id="storeSelect">
            <option value="all">全部门店</option>
          </select>
        </div>
        <button class="btn-config" id="btnConfig" title="门店配置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          门店配置
        </button>
      </div>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="monitor">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        监控面板
        <span class="badge" id="monitorBadge">0</span>
      </button>
      <button class="tab-btn" data-tab="review">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        评价核查
      </button>
      <button class="tab-btn" data-tab="reply">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        回复草稿
      </button>
    </nav>

    <main class="content-area">
      <section class="tab-panel active" id="panel-monitor">
        <div class="panel-header">
          <div class="panel-title">
            <h2>风险预警</h2>
            <span class="risk-count" id="todayRiskCount">共 0 条</span>
          </div>
          <div class="panel-filters">
            <div class="time-range-group">
              <button class="range-btn active" data-range="today">今日</button>
              <button class="range-btn" data-range="week">近7天</button>
              <button class="range-btn" data-range="all">全部</button>
            </div>
            <select id="riskLevelFilter">
              <option value="all">全部风险等级</option>
              <option value="high">高风险</option>
              <option value="medium">中风险</option>
              <option value="low">低风险</option>
            </select>
            <select id="platformFilter">
              <option value="all">全部平台</option>
              <option value="dianping">大众点评</option>
              <option value="waimai">外卖平台</option>
              <option value="video">短视频探店</option>
              <option value="community">本地社群</option>
            </select>
            <button class="btn-add-review" id="btnAddReview">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              录入评价
            </button>
          </div>
        </div>

        <div class="risk-cards" id="riskCards">
        </div>
      </section>

      <section class="tab-panel" id="panel-review">
        <div class="panel-header">
          <div class="panel-title">
            <h2>评价核查</h2>
            <span class="review-stats" id="reviewStats">待处理 0 条</span>
          </div>
          <div class="panel-filters">
            <select id="reviewStatusFilter">
              <option value="all">全部状态</option>
              <option value="pending">待核查</option>
              <option value="true">属实</option>
              <option value="misunderstanding">误会</option>
              <option value="malicious">恶意竞争</option>
              <option value="contact">需联系顾客</option>
            </select>
            <select id="reviewProgressFilter">
              <option value="all">全部进度</option>
              <option value="none">未跟进</option>
              <option value="contacted">已联系</option>
              <option value="compensated">已补偿</option>
              <option value="replied">已公开回复</option>
            </select>
          </div>
        </div>

        <div class="review-layout">
          <div class="review-list" id="reviewList">
          </div>
          <div class="review-detail" id="reviewDetail">
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              <p>请从左侧选择一条评价进行核查</p>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="panel-reply">
        <div class="panel-header">
          <div class="panel-title">
            <h2>回复草稿</h2>
            <span class="reply-hint" id="replyContextHint">选择场景和语气，生成专业回复</span>
          </div>
        </div>

        <div class="reply-layout">
          <div class="reply-sidebar">
            <div class="reply-category">
              <h3>场景分类</h3>
              <div class="category-list" id="categoryList">
                <button class="category-btn active" data-category="hygiene">卫生问题</button>
                <button class="category-btn" data-category="attitude">服务态度</button>
                <button class="category-btn" data-category="wait">排队/等待</button>
                <button class="category-btn" data-category="taste">口味/菜品</button>
                <button class="category-btn" data-category="price">价格争议</button>
                <button class="category-btn" data-category="general">通用致歉</button>
              </div>
            </div>
            <div class="reply-tone">
              <h3>回复语气</h3>
              <div class="tone-list" id="toneList">
                <button class="tone-btn active" data-tone="sincere">诚恳道歉</button>
                <button class="tone-btn" data-tone="professional">专业正式</button>
                <button class="tone-btn" data-tone="warm">亲切温暖</button>
                <button class="tone-btn" data-tone="firm">坚定理性</button>
              </div>
            </div>
          </div>

          <div class="reply-main">
            <div class="template-preview">
              <div class="template-header">
                <h3 id="templateTitle">诚恳道歉 - 卫生问题</h3>
                <button class="btn-copy" id="btnCopy">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  复制
                </button>
              </div>
              <div class="template-content" id="templateContent">
              </div>
            </div>

            <div class="reply-editor">
              <h3>自定义编辑</h3>
              <textarea id="replyEditor" placeholder="在此编辑您的回复内容..."></textarea>
              <div class="editor-actions">
                <button class="btn-secondary" id="btnUseTemplate">使用模板填充</button>
                <button class="btn-primary" id="btnSaveDraft">保存草稿</button>
              </div>
            </div>

            <div class="draft-history">
              <h3>历史草稿</h3>
              <div class="draft-list" id="draftList">
                <p class="empty-text">暂无历史草稿</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="configModal">
    <div class="modal">
      <div class="modal-header">
        <h2>门店配置</h2>
        <button class="modal-close" id="closeConfig">&times;</button>
      </div>
      <div class="modal-body">
        <div class="config-section">
          <h3>基本信息</h3>
          <div class="form-group">
            <label>店铺名称</label>
            <input type="text" id="storeName" placeholder="例如：味道轩中餐厅">
          </div>
          <div class="form-group">
            <label>分店地址</label>
            <div class="address-list" id="addressList">
            </div>
            <button class="btn-add" id="addAddress">+ 添加分店</button>
          </div>
        </div>

        <div class="config-section">
          <h3>菜品/服务项目</h3>
          <div class="form-group">
            <div class="items-list" id="itemsList">
            </div>
            <div class="add-item">
              <input type="text" id="newItem" placeholder="输入菜品或服务名称">
              <button class="btn-add" id="addItem">+ 添加</button>
            </div>
          </div>
        </div>

        <div class="config-section">
          <h3>监控关键词</h3>
          <p class="form-hint">系统将重点监控包含以下关键词的负面评价</p>
          <div class="keywords-list" id="keywordsList">
          </div>
          <div class="add-item" style="margin-top:10px">
            <input type="text" id="newKeyword" placeholder="输入新的监控关键词">
            <button class="btn-add" id="addKeyword">+ 添加</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelConfig">取消</button>
        <button class="btn-primary" id="saveConfig">保存配置</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addReviewModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>手动录入风险评价</h2>
        <button class="modal-close" id="closeAddReview">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group form-half">
            <label>来源平台 *</label>
            <select id="inputPlatform">
              <option value="">请选择平台</option>
              <option value="dianping">大众点评</option>
              <option value="waimai">外卖平台</option>
              <option value="video">短视频探店</option>
              <option value="community">本地社群</option>
            </select>
          </div>
          <div class="form-group form-half">
            <label>所属门店 *</label>
            <select id="inputStore">
              <option value="">请选择门店</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-half">
            <label>星级评分</label>
            <select id="inputRating">
              <option value="null">无评分</option>
              <option value="1">1 星</option>
              <option value="2">2 星</option>
              <option value="3">3 星</option>
              <option value="4">4 星</option>
              <option value="5">5 星</option>
            </select>
          </div>
          <div class="form-group form-half">
            <label>风险等级</label>
            <select id="inputRiskLevel">
              <option value="high">高风险</option>
              <option value="medium">中风险</option>
              <option value="low">低风险</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>评价内容 *</label>
          <textarea id="inputContent" rows="4" placeholder="粘贴或输入完整的评价内容..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group form-half">
            <label>点赞数</label>
            <input type="number" id="inputLikes" value="0" min="0">
          </div>
          <div class="form-group form-half">
            <label>评价人</label>
            <input type="text" id="inputAuthor" placeholder="用户昵称（可选）">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-half">
            <label class="checkbox-label">
              <input type="checkbox" id="inputInfluencer">
              <span>达人转发</span>
            </label>
          </div>
          <div class="form-group form-half">
            <label class="checkbox-label">
              <input type="checkbox" id="inputEvidence">
              <span>有证据图片</span>
            </label>
          </div>
        </div>
        <div class="matched-keywords" id="matchedKeywords" style="display:none">
          <label>命中关键词</label>
          <div id="matchedKeywordsList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelAddReview">取消</button>
        <button class="btn-primary" id="confirmAddReview">保存并录入</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
